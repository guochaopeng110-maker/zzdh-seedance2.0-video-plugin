<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>实时日志</title>
  <link rel="stylesheet" href="../../../plugin-sdk.css">
  <style>
    body {
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .header h3 { margin: 0; }
    .header .spacer { flex: 1; }
    .header label {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .header .status {
      font-size: 11px;
      color: var(--text-muted);
    }
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: "Consolas", "Courier New", "Source Code Pro", monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-entry {
      white-space: pre-wrap;
      word-break: break-all;
      padding: 1px 0;
    }
    .log-time { color: var(--text-muted); margin-right: 8px; }
    .log-level-ERROR { color: #ff5252; }
    .log-level-WARNING { color: #ffc107; }
    .log-level-INFO { color: #81c784; }
    .log-level-DEBUG { color: #90caf9; }
  </style>
</head>
<body>
  <div class="header">
    <h3>实时日志</h3>
    <span class="spacer"></span>
    <span class="status" id="status"></span>
    <label><input type="checkbox" id="autoScroll" checked> 自动滚动</label>
    <button id="clearBtn" type="button">清空</button>
  </div>
  <div class="log-container" id="logContainer"></div>

  <script>
    var PopupComm = {
      _handlers: {},
      send: function (action, data) {
        if (window.opener) {
          window.opener.postMessage({
            __typetale_plugin: true,
            type: 'plugin_action',
            action: action,
            data: data || {}
          }, '*')
        }
      },
      onAction: function (action, cb) {
        if (!this._handlers[action]) this._handlers[action] = []
        this._handlers[action].push(cb)
      }
    }
    window.addEventListener('message', function (evt) {
      var d = evt.data
      if (!d || d.__typetale_plugin !== true || d.type !== 'action') return
      var cbs = PopupComm._handlers[d.action]
      if (cbs) cbs.forEach(function (cb) { try { cb(d.data) } catch(e) { console.error(e) } })
    })

    var logContainer = document.getElementById('logContainer')
    var autoScroll = document.getElementById('autoScroll')
    var statusEl = document.getElementById('status')
    var sinceIndex = 0
    var timer = null
    var totalCount = 0

    document.getElementById('clearBtn').addEventListener('click', function () {
      logContainer.innerHTML = ''
      totalCount = 0
      statusEl.textContent = ''
    })

    function poll() {
      PopupComm.send('get_logs', { since_index: sinceIndex })
    }

    PopupComm.onAction('get_logs', function (data) {
      if (!data) return
      if (!data.ok) {
        statusEl.textContent = '错误: ' + (data.error || '未知错误')
        return
      }
      var logs = data.entries
      if (!logs || !logs.length) {
        if (totalCount === 0) statusEl.textContent = '等待日志… (生成视频时会产生日志)'
        return
      }
      var frag = document.createDocumentFragment()
      for (var i = 0; i < logs.length; i++) {
        var entry = logs[i]
        if (entry.index > sinceIndex) sinceIndex = entry.index
        totalCount++
        var div = document.createElement('div')
        div.className = 'log-entry'
        div.innerHTML = '<span class="log-time">' + esc(entry.time) + '</span>' +
          '<span class="log-level-' + entry.level + '">' + esc(entry.msg) + '</span>'
        frag.appendChild(div)
      }
      logContainer.appendChild(frag)
      statusEl.textContent = '共 ' + totalCount + ' 条 (缓冲索引: ' + sinceIndex + ')'
      if (autoScroll.checked) {
        logContainer.scrollTop = logContainer.scrollHeight
      }
    })

    function esc(text) {
      var d = document.createElement('div')
      d.textContent = text || ''
      return d.innerHTML
    }

    poll()
    timer = setInterval(poll, 2000)

    window.addEventListener('beforeunload', function () {
      if (timer) clearInterval(timer)
    })
  </script>
</body>
</html>
