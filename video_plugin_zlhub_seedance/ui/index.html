<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <title>TDu&ZLHub Seedance 视频生成插件V1.1.0</title>
        <link rel="stylesheet" href="../../../plugin-sdk.css" />
        <style>
            .api-key-wrapper {
                position: relative;
                display: flex;
                align-items: center;
            }

            .api-key-wrapper input {
                flex: 1;
                padding-right: 36px;
            }

            .toggle-eye {
                position: absolute;
                right: 8px;
                background: none;
                border: none;
                color: var(--text-muted);
                cursor: pointer;
                font-size: 14px;
                padding: 2px 4px;
                line-height: 1;
            }

            .toggle-eye:hover {
                color: var(--text-primary);
            }

            .hint-text {
                font-size: 11px;
                color: var(--text-muted);
                margin-top: 8px;
                line-height: 1.5;
            }

            .form-row {
                margin-bottom: 12px;
            }

            .action-buttons {
                display: flex;
                gap: 8px;
                margin-top: 12px;
            }

            .action-buttons button {
                flex: 1;
                padding: 7px 0;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <h3>TDu&ZLHub Seedance 视频生成插件V1.1.0</h3>
        <p class="hint-text">
            对接 ZLHub 中转平台，使用 Seedance 2.0 模型生成视频
        </p>
        <hr />

        <div class="form-row">
            <label class="form-label">API Key</label>
            <div class="form-control">
                <div class="api-key-wrapper">
                    <input
                        type="password"
                        id="apiKeyInput"
                        placeholder="ZLHub API Key"
                    />
                    <button class="toggle-eye" id="toggleEye" type="button">
                        &#128065;
                    </button>
                </div>
            </div>
        </div>
        <div class="form-row">
            <label class="form-label">Audit User ID</label>
            <div class="form-control">
                <input
                    type="number"
                    id="auditUserIdInput"
                    min="1"
                    step="1"
                    placeholder="审核用户ID（仅仿真人风格需要）"
                />
            </div>
        </div>
        <div class="form-row">
            <label class="form-label">Audit AES Key（可选）</label>
            <div class="form-control">
                <input
                    type="password"
                    id="auditAesKeyInput"
                    placeholder="64位HEX，留空则读取环境变量 AUDIT_AES_KEY"
                />
            </div>
            <div class="hint-text">
                建议通过环境变量注入 AES Key。仅在“仿真人风格”审核链路中使用。
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">API 地址</label>
            <div class="form-control">
                <select id="baseUrlSelect">
                    <option
                        value="https://zlhub.xiaowaiyou.cn/zhonglian/api/v1/proxy/ark/contents/generations/tasks"
                        selected
                    >
                        ZLHub 标准 (Default)
                    </option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Model</label>
            <div class="form-control">
                <select id="modelSelect">
                    <option value="doubao-seedance-2.0" selected>
                        doubao-seedance-2.0
                    </option>
                    <option value="doubao-seedance-2.0-fast">
                        doubao-seedance-2.0-fast
                    </option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <label class="form-label">视频风格</label>
            <div class="form-control">
                <select id="videoStyleSelect">
                    <option value="其他风格" selected>其他风格 (默认)</option>
                    <option value="仿真人风格">仿真人风格 (触发审核)</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <label class="form-label">分辨率</label>
            <div class="form-control">
                <select id="resolutionSelect">
                    <option value="720p">720p (默认)</option>
                    <option value="480p">480p</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">宽高比(Ratio)</label>
            <div class="form-control">
                <select id="ratioSelect">
                    <option value="adaptive">adaptive (自动适配)</option>
                    <option value="16:9">16:9 (横屏)</option>
                    <option value="9:16">9:16 (竖屏)</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4">3:4</option>
                    <option value="1:1">1:1 (正方形)</option>
                    <option value="21:9">21:9</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">视频时长 (Duration)</label>
            <div class="form-control">
                <select id="durationSelect">
                    <option value="1">1秒</option>
                    <option value="2">2秒</option>
                    <option value="3">3秒</option>
                    <option value="4">4秒</option>
                    <option value="5">5秒</option>
                    <option value="6">6秒</option>
                    <option value="7">7秒</option>
                    <option value="8">8秒</option>
                    <option value="9">9秒</option>
                    <option value="10">10秒</option>
                    <option value="11">11秒</option>
                    <option value="12">12秒</option>
                    <option value="13">13秒</option>
                    <option value="14">14秒</option>
                    <option value="15">15秒</option>
                    <option value="-1">模型决定 (-1)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">生成音频</label>
            <div class="form-control">
                <select id="generateAudioSelect">
                    <option value="true">开启(默认)</option>
                    <option value="false">关闭 (无声)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">联网搜索 (Web Search)</label>
            <div class="form-control">
                <select id="webSearchSelect">
                    <option value="false">禁用 (默认)</option>
                    <option value="true">启用</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">超时时间(秒)</label>
            <div class="form-control">
                <input
                    type="number"
                    id="timeoutInput"
                    min="60"
                    max="3600"
                    step="1"
                    value="900"
                />
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">最大轮询次数</label>
            <div class="form-control">
                <input
                    type="number"
                    id="maxPollAttemptsInput"
                    min="1"
                    max="2000"
                    step="1"
                    value="300"
                />
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">轮询间隔(秒)</label>
            <div class="form-control">
                <input
                    type="number"
                    id="pollIntervalInput"
                    min="1"
                    max="120"
                    step="1"
                    value="5"
                />
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">重试次数</label>
            <div class="form-control">
                <input
                    type="number"
                    id="retryCountInput"
                    min="0"
                    max="10"
                    step="1"
                    value="3"
                />
            </div>
        </div>

        <div class="hint-text">
            <strong>Seedance 2.0 约束提示</strong><br />
            - 图片大小需小于 30MB<br />
            - 文本建议：中文<=500字，英文>=1000词<br />
        </div>

        <div class="action-buttons">
            <button id="btnTaskLog" type="button">任务日志 / 手动拉取</button>
            <button id="btnLiveLog" type="button">实时日志</button>
        </div>

        <script src="../../../plugin-sdk.js"></script>
        <script>
            var apiKeyInput = document.getElementById("apiKeyInput");
            var toggleEye = document.getElementById("toggleEye");
            var resolutionSelect = document.getElementById("resolutionSelect");
            var ratioSelect = document.getElementById("ratioSelect");
            var durationSelect = document.getElementById("durationSelect");
            var generateAudioSelect = document.getElementById(
                "generateAudioSelect",
            );
            var webSearchSelect = document.getElementById("webSearchSelect");
            var videoStyleSelect = document.getElementById("videoStyleSelect");
            var auditUserIdInput = document.getElementById("auditUserIdInput");
            var auditAesKeyInput = document.getElementById("auditAesKeyInput");
            var timeoutInput = document.getElementById("timeoutInput");
            var baseUrlSelect = document.getElementById("baseUrlSelect");
            var modelSelect = document.getElementById("modelSelect");
            var maxPollAttemptsInput = document.getElementById(
                "maxPollAttemptsInput",
            );
            var pollIntervalInput =
                document.getElementById("pollIntervalInput");
            var retryCountInput = document.getElementById("retryCountInput");
            var btnTaskLog = document.getElementById("btnTaskLog");
            var btnLiveLog = document.getElementById("btnLiveLog");

            toggleEye.addEventListener("click", function () {
                if (apiKeyInput.type === "password") {
                    apiKeyInput.type = "text";
                    toggleEye.textContent = "\uD83D\uDE48";
                } else {
                    apiKeyInput.type = "password";
                    toggleEye.textContent = "\uD83D\uDC41";
                }
            });

            apiKeyInput.addEventListener("change", function () {
                PluginSDK.saveParam("api_key", apiKeyInput.value);
            });
            auditUserIdInput.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "audit_user_id",
                    (auditUserIdInput.value || "").trim(),
                );
            });
            auditAesKeyInput.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "audit_aes_key",
                    (auditAesKeyInput.value || "").trim(),
                );
            });

            baseUrlSelect.addEventListener("change", function () {
                PluginSDK.saveParam("base_url", baseUrlSelect.value);
            });

            modelSelect.addEventListener("change", function () {
                PluginSDK.saveParam("model", modelSelect.value);
            });
            videoStyleSelect.addEventListener("change", function () {
                PluginSDK.saveParam("video_style", videoStyleSelect.value);
            });

            resolutionSelect.addEventListener("change", function () {
                PluginSDK.saveParam("resolution", resolutionSelect.value);
            });

            ratioSelect.addEventListener("change", function () {
                PluginSDK.saveParam("ratio", ratioSelect.value);
            });

            durationSelect.addEventListener("change", function () {
                PluginSDK.saveParam("duration", parseInt(durationSelect.value));
            });

            generateAudioSelect.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "generate_audio",
                    generateAudioSelect.value === "true",
                );
            });

            webSearchSelect.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "web_search",
                    webSearchSelect.value === "true",
                );
            });

            timeoutInput.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "timeout",
                    parseInt(timeoutInput.value, 10) || 900,
                );
            });

            maxPollAttemptsInput.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "max_poll_attempts",
                    parseInt(maxPollAttemptsInput.value, 10) || 300,
                );
            });

            pollIntervalInput.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "poll_interval",
                    parseInt(pollIntervalInput.value, 10) || 5,
                );
            });

            retryCountInput.addEventListener("change", function () {
                PluginSDK.saveParam(
                    "retry_count",
                    parseInt(retryCountInput.value, 10) || 3,
                );
            });

            btnTaskLog.addEventListener("click", function () {
                PluginSDK.sendAction("open_task_logs");
            });

            btnLiveLog.addEventListener("click", function () {
                PluginSDK.sendAction("open_live_logs");
            });

            PluginSDK.onReady(function (params) {
                if (params.api_key) apiKeyInput.value = params.api_key;
                if (params.audit_user_id)
                    auditUserIdInput.value = params.audit_user_id;
                if (params.audit_aes_key)
                    auditAesKeyInput.value = params.audit_aes_key;
                if (params.base_url) baseUrlSelect.value = params.base_url;
                if (params.model) modelSelect.value = params.model;
                if (params.video_style)
                    videoStyleSelect.value = params.video_style;
                if (params.resolution)
                    resolutionSelect.value = params.resolution;
                if (params.ratio) ratioSelect.value = params.ratio;
                if (params.duration != null)
                    durationSelect.value = String(params.duration);
                if (params.generate_audio != null)
                    generateAudioSelect.value = String(params.generate_audio);
                if (params.web_search != null)
                    webSearchSelect.value = String(params.web_search);
                if (params.timeout) timeoutInput.value = params.timeout;
                if (params.max_poll_attempts)
                    maxPollAttemptsInput.value = params.max_poll_attempts;
                if (params.poll_interval)
                    pollIntervalInput.value = params.poll_interval;
                if (params.retry_count != null)
                    retryCountInput.value = params.retry_count;
            });
        </script>
    </body>
</html>
