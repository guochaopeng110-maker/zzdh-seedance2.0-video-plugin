<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ZLHub Seedance 瑙嗛鐢熸垚鎻掍欢</title>
  <link rel="stylesheet" href="../../../plugin-sdk.css">
  <style>
    .api-key-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .api-key-wrapper input {
      flex: 1;
      padding-right: 36px;
    }

    .toggle-eye {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      line-height: 1;
    }

    .toggle-eye:hover {
      color: var(--text-primary);
    }

    .hint-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .form-row {
      margin-bottom: 12px;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .action-buttons button {
      flex: 1;
      padding: 7px 0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h3>ZLHub Seedance 瑙嗛鐢熸垚鎻掍欢</h3>
  <p class="hint-text">瀵规帴 ZLHub 涓浆骞冲彴锛屼娇鐢?Seedance 2.0 妯″瀷鐢熸垚瑙嗛銆?/p>
  <hr>

  <div class="form-row">
    <label class="form-label">API Key</label>
    <div class="form-control">
      <div class="api-key-wrapper">
        <input type="password" id="apiKeyInput" placeholder="ZLHub API Key">
        <button class="toggle-eye" id="toggleEye" type="button">&#128065;</button>
      </div>
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">API 鍦板潃</label>
    <div class="form-control">
      <select id="baseUrlSelect">
        <option value="https://zlhub.xiaowaiyou.cn/zhonglian/api/v1/proxy/ark/contents/generations/tasks" selected>ZLHub 鏍囧噯 (Default)</option>
      </select>
    </div>
  </div>

    <div class="form-row">
    <label class="form-label">Model</label>
    <div class="form-control">
      <select id="modelSelect">
        <option value="doubao-seedance-2.0" selected>doubao-seedance-2.0</option>
      </select>
    </div>
  </div>
<div class="form-row">
    <label class="form-label">鍒嗚鲸鐜?/label>
    <div class="form-control">
      <select id="resolutionSelect">
        <option value="720p">720p (榛樿)</option>
        <option value="480p">480p</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">瀹介珮姣?(Ratio)</label>
    <div class="form-control">
      <select id="ratioSelect">
        <option value="adaptive">adaptive (鑷姩閫傞厤)</option>
        <option value="16:9">16:9 (妯睆)</option>
        <option value="9:16">9:16 (绔栧睆)</option>
        <option value="4:3">4:3</option>
        <option value="3:4">3:4</option>
        <option value="1:1">1:1 (姝ｆ柟褰?</option>
        <option value="21:9">21:9</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">瑙嗛鏃堕暱 (Duration)</label>
    <div class="form-control">
      <select id="durationSelect">
        <option value="5">5绉?(榛樿)</option>
        <option value="-1">妯″瀷鍐冲畾 (-1)</option>
        <option value="4">4绉?/option>
        <option value="8">8绉?/option>
        <option value="10">10绉?/option>
        <option value="12">12绉?/option>
        <option value="15">15绉?/option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">鐢熸垚闊抽</label>
    <div class="form-control">
      <select id="generateAudioSelect">
        <option value="true">寮€鍚?(榛樿)</option>
        <option value="false">鍏抽棴 (鏃犲０)</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">鑱旂綉鎼滅储 (Web Search)</label>
    <div class="form-control">
      <select id="webSearchSelect">
        <option value="false">绂佺敤 (榛樿)</option>
        <option value="true">鍚敤</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">瓒呮椂鏃堕棿(绉?</label>
    <div class="form-control">
      <input type="number" id="timeoutInput" min="60" max="3600" step="1" value="900">
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">鏈€澶ц疆璇㈡鏁?/label>
    <div class="form-control">
      <input type="number" id="maxPollAttemptsInput" min="1" max="2000" step="1" value="300">
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">杞闂撮殧(绉?</label>
    <div class="form-control">
      <input type="number" id="pollIntervalInput" min="1" max="120" step="1" value="5">
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">閲嶈瘯娆℃暟</label>
    <div class="form-control">
      <input type="number" id="retryCountInput" min="0" max="10" step="1" value="3">
    </div>
  </div>

  <div class="hint-text">
    <strong>Seedance 2.0 绾︽潫鎻愮ず锛?/strong><br>
    - 鍥剧墖澶у皬闇€灏忎簬 30MB銆?br>
    - 鏂囨湰寤鸿锛氫腑鏂?鈮?500瀛楋紝鑻辨枃 鈮?1000璇嶃€?  </div>

  <div class="action-buttons">
    <button id="btnTaskLog" type="button">浠诲姟鏃ュ織 / 鎵嬪姩鎷夊彇</button>
    <button id="btnLiveLog" type="button">瀹炴椂鏃ュ織</button>
  </div>

  <script src="../../../plugin-sdk.js"></script>
  <script>
    var apiKeyInput = document.getElementById('apiKeyInput');
    var toggleEye = document.getElementById('toggleEye');
    var resolutionSelect = document.getElementById('resolutionSelect');
    var ratioSelect = document.getElementById('ratioSelect');
    var durationSelect = document.getElementById('durationSelect');
    var generateAudioSelect = document.getElementById('generateAudioSelect');
    var webSearchSelect = document.getElementById('webSearchSelect');
    var timeoutInput = document.getElementById('timeoutInput');
    var baseUrlSelect = document.getElementById('baseUrlSelect');
    var modelSelect = document.getElementById('modelSelect');
    var maxPollAttemptsInput = document.getElementById('maxPollAttemptsInput');
    var pollIntervalInput = document.getElementById('pollIntervalInput');
    var retryCountInput = document.getElementById('retryCountInput');
    var btnTaskLog = document.getElementById('btnTaskLog');
    var btnLiveLog = document.getElementById('btnLiveLog');

    toggleEye.addEventListener('click', function () {
      if (apiKeyInput.type === 'password') {
        apiKeyInput.type = 'text';
        toggleEye.textContent = '\uD83D\uDE48';
      } else {
        apiKeyInput.type = 'password';
        toggleEye.textContent = '\uD83D\uDC41';
      }
    });

    apiKeyInput.addEventListener('change', function () {
      PluginSDK.saveParam('api_key', apiKeyInput.value);
    });

    baseUrlSelect.addEventListener('change', function () {
      PluginSDK.saveParam('base_url', baseUrlSelect.value);
    });

    modelSelect.addEventListener('change', function () {
      PluginSDK.saveParam('model', modelSelect.value);
    });

    resolutionSelect.addEventListener('change', function () {
      PluginSDK.saveParam('resolution', resolutionSelect.value);
    });

    ratioSelect.addEventListener('change', function () {
      PluginSDK.saveParam('ratio', ratioSelect.value);
    });

    durationSelect.addEventListener('change', function () {
      PluginSDK.saveParam('duration', parseInt(durationSelect.value));
    });

    generateAudioSelect.addEventListener('change', function () {
      PluginSDK.saveParam('generate_audio', generateAudioSelect.value === 'true');
    });

    webSearchSelect.addEventListener('change', function () {
      PluginSDK.saveParam('web_search', webSearchSelect.value === 'true');
    });

    timeoutInput.addEventListener('change', function () {
      PluginSDK.saveParam('timeout', parseInt(timeoutInput.value, 10) || 900);
    });

    maxPollAttemptsInput.addEventListener('change', function () {
      PluginSDK.saveParam('max_poll_attempts', parseInt(maxPollAttemptsInput.value, 10) || 300);
    });

    pollIntervalInput.addEventListener('change', function () {
      PluginSDK.saveParam('poll_interval', parseInt(pollIntervalInput.value, 10) || 5);
    });

    retryCountInput.addEventListener('change', function () {
      PluginSDK.saveParam('retry_count', parseInt(retryCountInput.value, 10) || 3);
    });

    btnTaskLog.addEventListener('click', function () {
      PluginSDK.sendAction('open_task_logs');
    });

    btnLiveLog.addEventListener('click', function () {
      PluginSDK.sendAction('open_live_logs');
    });

    PluginSDK.onReady(function (params) {
      if (params.api_key) apiKeyInput.value = params.api_key;
      if (params.base_url) baseUrlSelect.value = params.base_url;
      if (params.model) modelSelect.value = params.model;
      if (params.resolution) resolutionSelect.value = params.resolution;
      if (params.ratio) ratioSelect.value = params.ratio;
      if (params.duration != null) durationSelect.value = String(params.duration);
      if (params.generate_audio != null) generateAudioSelect.value = String(params.generate_audio);
      if (params.web_search != null) webSearchSelect.value = String(params.web_search);
      if (params.timeout) timeoutInput.value = params.timeout;
      if (params.max_poll_attempts) maxPollAttemptsInput.value = params.max_poll_attempts;
      if (params.poll_interval) pollIntervalInput.value = params.poll_interval;
      if (params.retry_count != null) retryCountInput.value = params.retry_count;
    });
  </script>
</body>
</html>
